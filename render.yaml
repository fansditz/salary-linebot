services:
  - type: web
    name: salary-linebot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: DATABASE_PATH
        value: /var/data/salary_linebot.db
    disk:
      name: salary-linebot-data
      mountPath: /var/data
      sizeGB: 1
